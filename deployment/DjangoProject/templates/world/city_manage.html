<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>City Manager</title>
  </head>
  <body>
    <h1>City Manager</h1>

    <h2>Search</h2>
    <input id="q" placeholder="Type a city name" />
    <button id="searchBtn">Search</button>

    <ul id="results"></ul>

    <h2>Add city</h2>
    <form id="addForm" method="post" action="/cities/add/">
      {% csrf_token %}
      <div>
        <label>Name</label>
        <input name="name" id="name" required />
      </div>
      <div>
        <label>Lat</label>
        <input name="lat" id="lat" required />
      </div>
      <div>
        <label>Long</label>
        <input name="long" id="long" required />
      </div>
      <button type="submit">Add</button>
    </form>

    <script>
      async function search() {
        const q = document.getElementById("q").value.trim();
        if (!q) return;
        const resp = await fetch(`/cities/search/?q=${encodeURIComponent(q)}`);
        const data = await resp.json();

        const ul = document.getElementById("results");
        ul.innerHTML = "";

        (data.results || []).forEach(r => {
          const li = document.createElement("li");
          li.textContent = `${r.display_name} (${r.lat}, ${r.long})`;
          li.style.cursor = "pointer";
          li.onclick = () => {
            document.getElementById("name").value = q;
            document.getElementById("lat").value = r.lat;
            document.getElementById("long").value = r.long;
          };
          ul.appendChild(li);
        });
      }

      document.getElementById("searchBtn").addEventListener("click", search);
    </script>
  </body>
</html>
