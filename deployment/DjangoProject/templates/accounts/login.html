<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Login</title>
  </head>
  <body>
    <h1>Login</h1>

    {% if form.errors %}
      <p style="color: red;">Invalid username or password.</p>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div>
        <label for="id_username">Username</label>
        {{ form.username }}
      </div>
      <div>
        <label for="id_password">Password</label>
        {{ form.password }}
      </div>
      <button type="submit">Login</button>
    </form>

    <p>No account? <a href="/register/">Register</a></p>
  </body>
</html>
