<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Select City</title>
  </head>
  <body>
    <h1>Select your city</h1>

    <p>
      Current:
      <strong>
        {% if selected_city %}{{ selected_city.name }}{% else %}None{% endif %}
      </strong>
    </p>

    <form method="post">
      {% csrf_token %}
      <label for="city_id">City:</label>
      <select name="city_id" id="city_id" required>
        <option value="" disabled {% if not selected_city %}selected{% endif %}>Choose a city</option>
        {% for city in cities %}
          <option value="{{ city.id }}" {% if selected_city and city.id == selected_city.id %}selected{% endif %}>
            {{ city.name }}
          </option>
        {% endfor %}
      </select>

      <button type="submit">Save</button>
    </form>
  </body>
</html>
