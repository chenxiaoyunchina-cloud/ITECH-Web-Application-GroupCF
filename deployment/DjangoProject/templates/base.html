<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SideQuest City{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fb;
        }

        .app-container {
            max-width: 1100px;
        }

        .page-card {
            background: white;
            border-radius: 16px;
            border: 1px solid #e4e7eb;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .form-control,
        .form-select {
            border-radius: 10px;
            min-height: 45px;
        }

        .btn {
            border-radius: 10px;
        }

        .form-control:focus,
        .form-select:focus,
        .btn:focus {
            outline: 3px solid rgba(13,110,253,.25);
            box-shadow: none;
        }
    </style>

</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container app-container">
        <span class="navbar-brand">SideQuest City</span>
    </div>
</nav>

<main class="container app-container mt-4">

{% block content %}
{% endblock %}

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
